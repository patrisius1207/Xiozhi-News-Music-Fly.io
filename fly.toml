# fly.toml — Konfigurasi Fly.io untuk XiaoZhi MCP + Stream Server

app = "xiaozhi-mcp"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https   = false
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

# Port 2233 untuk audio streaming ke ESP32
[[services]]
  protocol = "tcp"
  internal_port = 2233

  [[services.ports]]
    port = 2233

[[vm]]
  memory = "512mb"   # naik dari 256mb karena yt-dlp + stream butuh lebih banyak RAM
  cpus   = 1
