# fly.toml — Konfigurasi Fly.io untuk XiaoZhi MCP + Stream Server

app = "xiaozhi-mcp"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Satu HTTP service yang handle semua port
[http_service]
  internal_port = 8080
  force_https   = false
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpus   = 1
